name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-gate:
    name: Build Gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v4
      - name: Build Nix Checks
        run: >-
          nix build --print-build-logs
          .#checks.x86_64-linux.offchain
          .#checks.x86_64-linux.onchain
          .#checks.x86_64-linux.ci
          .#checks.x86_64-linux.onchainBlueprint

  repo-gate:
    name: Repository Gate
    runs-on: nixos
    needs: build-gate
    steps:
      - uses: actions/checkout@v4
      - name: Run CI App
        run: nix run .#ci

  lean:
    name: Lean spec
    runs-on: nixos
    steps:
      - uses: actions/checkout@v4
      - name: Build Lean spec
        working-directory: lean
        run: nix --quiet shell nixpkgs#elan -c lake build
        env:
          LEAN_OPTS: "-DwarningAsError=true"
      - name: Check for sorry
        run: |
          if grep -rn 'sorry' --include='*.lean' lean/; then
            echo "FAIL: sorry found in spec"
            exit 1
          fi
