name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-gate:
    name: Build Gate
    runs-on: nixos
    steps:
      - uses: actions/checkout@v4
      - name: Build Nix Checks
        run: >-
          nix build --print-build-logs
          .#checks.x86_64-linux.offchain-library
          .#checks.x86_64-linux.offchain-tests
          .#checks.x86_64-linux.onchain
          .#checks.x86_64-linux.onchainBlueprint

  offchain-gate:
    name: Offchain Gate
    runs-on: nixos
    needs: build-gate
    steps:
      - uses: actions/checkout@v4
      - name: Run Offchain Tests
        run: nix run .#offchain-tests
      - name: Run Offchain Format Check
        run: nix run .#offchain-format
      - name: Run Offchain Lint
        run: nix run .#offchain-lint

  onchain-gate:
    name: Onchain Gate
    runs-on: nixos
    needs: build-gate
    steps:
      - uses: actions/checkout@v4
      - name: Run Onchain App
        run: nix run .#onchain

  lean:
    name: Lean spec
    runs-on: nixos
    steps:
      - uses: actions/checkout@v4
      - name: Clean elan cache
        run: |
          rm -rf "$HOME/.elan"
          mkdir -p "$HOME/.elan"
      - name: Build Lean spec
        working-directory: lean
        run: nix --quiet shell nixpkgs#elan -c lake build
        env:
          LEAN_OPTS: "-DwarningAsError=true"
      - name: Check for sorry
        run: |
          if grep -rn 'sorry' --include='*.lean' lean/; then
            echo "FAIL: sorry found in spec"
            exit 1
          fi
